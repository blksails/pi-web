# 允许（本地回环的）远端页面调用应用自身的桌面凭据 keychain command。
#
# 同 pick-directory.toml 的先例：仅配 `core:default` 时，远端来源 invoke 应用自身
# command 会被 ACL 拒绝（报 `<command> not allowed. Plugin not found`）。必须逐条显式声明。
#
# spec desktop-cloud-login 任务 4.2（Req 5.4）：登录组件（login-dialog）成功拿到桌面凭据后
# 经 `invoke("store_credential")` 持久化；登出经 `invoke("clear_credential")` 清除；
# `load_credential` 供需要时读取当前值（如诊断/回显，非启动路径——启动播种走
# `main.rs base_env()` 的 Rust 内部同步读取，不经此 command/ACL）。
[[permission]]
identifier = "allow-store-credential"
description = "允许渲染层把登录得到的桌面凭据持久化进 OS keychain"
commands.allow = ["store_credential"]

[[permission]]
identifier = "allow-load-credential"
description = "允许渲染层读取当前持久化在 keychain 中的桌面凭据"
commands.allow = ["load_credential"]

[[permission]]
identifier = "allow-clear-credential"
description = "允许渲染层登出时清除 keychain 中的桌面凭据"
commands.allow = ["clear_credential"]
