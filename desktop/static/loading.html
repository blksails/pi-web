<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'" />
    <title>pi-web</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #0b0b0c; color: #e6e6e6;
        font: 14px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
      }
      .spinner {
        width: 28px; height: 28px; border-radius: 50%;
        border: 3px solid #2a2a2e; border-top-color: #7c9cff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title { font-weight: 600; letter-spacing: 0.02em; }
      .hint { color: #8a8a90; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div class="title">正在启动 pi-web…</div>
      <div class="hint">首次启动需初始化本地服务,请稍候</div>
    </div>
  </body>
</html>
