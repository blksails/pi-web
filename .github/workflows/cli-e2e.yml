name: CLI E2E (standalone · 多平台)

# 生产模式(standalone 自包含产物)的多操作系统集成测试。
# 每个平台各自 `pnpm build:cli`(nft 打包行为按平台不同 —— 这是被测对象本身),
# 然后跑两层验收:
#   - e2e:cli       stub 冒烟(产物完整性 + 参数路径 + 浏览器流式回包,无需凭据)
#   - e2e:cli:real  真实 runner(mock openai-completions provider,验依赖解析/会话不崩)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支并发取消旧跑,省 CI 额度。
concurrency:
  group: cli-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-e2e:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["22.19.0"]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 仅装 chromium(三个 e2e 都只用 chromium);Linux 上带系统依赖。
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      # 生产产物:standalone build + 静态资源补全 + 瘦身(scripts/pack-standalone.mjs)。
      - name: Build standalone CLI
        run: pnpm build:cli

      - name: E2E · CLI stub 冒烟
        run: pnpm e2e:cli

      - name: E2E · CLI 真实模式(mock provider)
        run: pnpm e2e:cli:real

      # 失败时上传证据截图,便于跨平台排查渲染/链路差异。
      - name: Upload evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-e2e-evidence-${{ matrix.os }}
          path: .kiro/specs/pi-web-cli/evidence/*.png
          if-no-files-found: ignore
